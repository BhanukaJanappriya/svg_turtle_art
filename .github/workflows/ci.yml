name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # The export extra (Pillow) is installed so mypy type-checks the raster
      # and export code against the real library. Without it a Pillow-specific
      # `type: ignore` becomes unused, which warn_unused_ignores turns into an
      # error.
      - run: pip install -e ".[dev,export]"
      - name: ruff check
        run: ruff check .
      - name: ruff format
        run: ruff format --check .
      - name: mypy
        run: mypy src

  test:
    name: Test ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # turtle needs tkinter, which the Linux runner image does not ship.
      - name: Install tkinter (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install
        run: pip install -e ".[dev,export]"

      - name: Test suite (headless)
        run: pytest -q --cov=svg_turtle_renderer --cov-report=xml

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  display:
    name: Window tests (virtual display)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y python3-tk xvfb
      - run: pip install -e ".[dev,export]"

      # These need a real screen and must not run under pytest's fd capture:
      # Tcl reads the standard channels while initialising and fails spuriously
      # when they are redirected. See CONTRIBUTING.md.
      - name: Window smoke test
        run: xvfb-run -a pytest -m display -s -q

      - name: End-to-end smoke script
        run: xvfb-run -a python scripts/smoke_render.py

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
